services:
  typescript:
    build:
      context: .
      dockerfile: typescript/Dockerfile
      target: development
      additional_contexts:
        tomo-idv-client-node: ../tomo-idv-client-node
    ports:
      - "4300:3000"
    env_file:
      - typescript/.env
    environment:
      - IDV_BASE_URL=${IDV_BASE_URL:-http://host.docker.internal}
      - IDV_APP_URL=${IDV_APP_URL:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - WECHAT_CLIENT_APP_ID=${WECHAT_CLIENT_APP_ID:-}
      - TEST_BOARD_PATH=/home/app/test-board/test-board.html

  kotlin:
    build:
      context: .
      dockerfile: kotlin/Dockerfile
      additional_contexts:
        tomo-idv-client-kotlin: ../tomo-idv-client-kotlin
    ports:
      - "4301:3000"
    env_file:
      - kotlin/.env
    environment:
      - IDV_BASE_URL=${IDV_BASE_URL:-http://host.docker.internal}
      - IDV_APP_URL=${IDV_APP_URL:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - WECHAT_CLIENT_APP_ID=${WECHAT_CLIENT_APP_ID:-}
      - TEST_BOARD_PATH=/app/test-board/test-board.html
