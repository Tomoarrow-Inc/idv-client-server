
services:
  client-server:
    image: tomoadmin/idv-client-server:test-0.0.2.6
    build: 
      context: ./
      target: development

  client-server-test:
    image: tomoadmin/idv-client-server:test-0.0.2.6

    ports:
      - "8080:3000"

    env_file:
      - .env
      - .env.test


  client-server-dev:
    image: tomoadmin/idv-client-server:test-0.0.2.6

    ports:
      - "8081:3000"

    env_file:
      - .env
      - .env.dev


  client-server-prod:
    image: tomoadmin/idv-client-server:test-0.0.2.6

    ports:
      - "80:3000"

    env_file:
      - .env
      - .env.prod

