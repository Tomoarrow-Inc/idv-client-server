
services:
  client-server:
    image: tomoadmin/idv-client-server:test-0.0.2.4
    build: 
      context: ./
      target: development

  client-server-test:
    image: tomoadmin/idv-client-server:test-0.0.2.4

    ports:
      - "8080:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://test.tomopayment.com


  client-server-dev:
    image: tomoadmin/idv-client-server:test-0.0.2.4

    ports:
      - "8081:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://dev.tomopayment.com


  client-server-prod:
    image: tomoadmin/idv-client-server:test-0.0.2.4

    ports:
      - "8082:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://api.tomopayment.com
