
services:
  # NOTE: unit-black-client-server로 배포할 땐 port 80 으로 맞춰야함(필수)
  client-server:
    image: tomoadmin/idv-client-server:test-0.0.2.5
    build:
      context: ../
      dockerfile: typescript/Dockerfile
      target: development

    ports:
      - "80:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://api.tomopayment.com


  client-server-test:
    image: tomoadmin/idv-client-server:test-0.0.2.5
    build:
      context: ../
      dockerfile: typescript/Dockerfile
      target: development

    ports:
      - "8080:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://test.tomopayment.com


  client-server-dev:
    image: tomoadmin/idv-client-server:test-0.0.2.5
    build:
      context: ../
      dockerfile: typescript/Dockerfile
      target: development

    ports:
      - "8081:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://dev.tomopayment.com


  client-server-prod:
    image: tomoadmin/idv-client-server:test-0.0.2.5
    build:
      context: ../
      dockerfile: typescript/Dockerfile
      target: production

    ports:
      - "8082:3000"

    env_file:
      - .env

    environment:
      - IDV_BASE_URL=https://api.tomopayment.com
